<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WoodGrow TASK</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Твій новий фірмовий фон Aqua Marine */
        body {
            background-color: #2EE8BB;
            color: #111c1a; /* Темний колір тексту для контрасту на світлому тлі */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            text-align: center;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Головний заголовок */
        h1 {
            color: #111c1a;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            color: #1a3a32;
            font-size: 16px;
            max-width: 280px;
            line-height: 1.5;
            margin-top: 5px;
            font-weight: 500;
        }

        /* Яскраві кнопки у стилі Ember */
        .btn-ember {
            background: linear-gradient(135deg, #ff9436 0%, #f27c16 100%);
            color: #ffffff;
            border: none;
            padding: 15px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            margin-top: 25px;
            box-shadow: 0 6px 20px rgba(242, 124, 22, 0.4);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.1s ease;
        }

        /* Ефект натискання на кнопку з мобільного */
        .btn-ember:active {
            transform: scale(0.96);
            background: #f27c16;
        }
    </style>
</head>
<body>

    <h1>WoodGrow TASK</h1>
    <p>Персональний кабінет успішно запущено!</p>
    
    <button class="btn-ember">Ember Кнопка</button>

    <script>
        // Повідомляємо Telegram, що додаток готовий
        window.Telegram.WebApp.ready();
        // Розгортаємо на весь екран смартфона
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
